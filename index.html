<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Push Room</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Arial,Helvetica,sans-serif;
background:#0f172a;
color:#fff;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}
.wrap{
width:100%;
max-width:460px;
padding:30px;
text-align:center;
}
.card{
background:#1e293b;
padding:25px;
border-radius:22px;
box-shadow:0 12px 30px rgba(0,0,0,.35);
}
h1{
font-size:38px;
margin-bottom:20px;
}
input{
width:100%;
padding:16px;
border:none;
border-radius:12px;
font-size:20px;
text-align:center;
margin-bottom:14px;
text-transform:uppercase;
}
button{
border:none;
cursor:pointer;
transition:.2s;
}
#connectBtn{
width:100%;
padding:14px;
border-radius:12px;
background:#22c55e;
color:#fff;
font-size:18px;
}
#pushBtn{
margin-top:20px;
width:220px;
height:220px;
border-radius:50%;
background:#3b82f6;
color:#fff;
font-size:42px;
font-weight:bold;
display:none;
}
#pushBtn:hover{transform:scale(1.03)}
#pushBtn:active{transform:scale(.96)}
.status{
margin-top:16px;
opacity:.85;
}
#notif{
margin-top:16px;
font-size:24px;
color:#facc15;
min-height:30px;
}
.panel{
margin-top:22px;
text-align:left;
background:#0f172a;
padding:14px;
border-radius:14px;
}
.machine{
padding:8px;
margin-bottom:8px;
border-radius:10px;
background:#334155;
font-size:14px;
}
</style>
</head>
<body>

<div class="wrap">
<div class="card">

<h1>⚡ Push Room</h1>

<input id="roomInput" placeholder="CODE ROOM" maxlength="12">
<button id="connectBtn">Connexion</button>

<button id="pushBtn">PUSH</button>

<div class="status" id="status">Non connecté</div>
<div id="notif"></div>

<div class="panel">
<b>🖥 Machines connectées</b>
<div id="machines">Aucune</div>
</div>

</div>
</div>

<script type="module">

import { createClient } from "https://esm.sh/@supabase/supabase-js@2"

const SUPABASE_URL = "https://ixbefzpxsmsvlqicwbda.supabase.co"
const SUPABASE_KEY = "sb_publishable_S0lBKp8KJQIzcdXJCdXz5A_bvv-Q9V2"

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

const roomInput = document.getElementById("roomInput")
const connectBtn = document.getElementById("connectBtn")
const pushBtn = document.getElementById("pushBtn")
const statusTxt = document.getElementById("status")
const notif = document.getElementById("notif")
const machinesDiv = document.getElementById("machines")

let myId = Math.random().toString(36).slice(2,8)
let room = null
let channel = null

function renderMachines(list=[]){
  if(!list.length){
    machinesDiv.innerHTML = "Aucune"
    return
  }

  machinesDiv.innerHTML = list.map(x =>
    `<div class="machine">${x}</div>`
  ).join("")
}

async function getRoom(){

  const { data } = await supabase
    .from("rooms")
    .select("*")
    .eq("code", room)
    .single()

  return data
}

connectBtn.onclick = async () => {

  room = roomInput.value.trim().toUpperCase()
  if(!room) return

  let row = await getRoom()

  if(!row){
    await supabase.from("rooms").insert({
      code: room,
      sender:"system",
      machines:[myId]
    })
  }else{
    let arr = row.machines || []
    if(!arr.includes(myId)) arr.push(myId)

    await supabase.from("rooms")
      .update({ machines: arr })
      .eq("code", room)
  }

  statusTxt.innerText = "🟢 Connecté à " + room
  pushBtn.style.display = "inline-block"

  const latest = await getRoom()
  renderMachines(latest.machines || [])

  if(channel) supabase.removeChannel(channel)

  channel = supabase
    .channel("room-"+room)
    .on("postgres_changes",{
      event:"UPDATE",
      schema:"public",
      table:"rooms",
      filter:`code=eq.${room}`
    }, payload => {

      const data = payload.new

      renderMachines(data.machines || [])

      if(data.sender !== myId && data.sender !== "system"){
        notif.innerText = "⚡ Push reçu !"

        setTimeout(()=>{
          notif.innerText = ""
        },1000)
      }

    })
    .subscribe()

}

pushBtn.onclick = async () => {

  if(!room) return

  await supabase
    .from("rooms")
    .update({
      last_push_at:new Date().toISOString(),
      sender:myId
    })
    .eq("code", room)

}

window.addEventListener("beforeunload", async () => {

  if(!room) return

  const row = await getRoom()
  if(!row) return

  let arr = row.machines || []
  arr = arr.filter(x => x !== myId)

  await supabase.from("rooms")
    .update({ machines: arr })
    .eq("code", room)

})

</script>
</body>
</html>
