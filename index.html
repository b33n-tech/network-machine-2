<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Push Room Clean</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Arial,Helvetica,sans-serif;
background:#0f172a;
color:#fff;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}
.wrap{
width:100%;
max-width:420px;
padding:30px;
text-align:center;
}
.card{
background:#1e293b;
padding:25px;
border-radius:22px;
box-shadow:0 10px 30px rgba(0,0,0,.35);
}
h1{
font-size:36px;
margin-bottom:20px;
}
input{
width:100%;
padding:15px;
font-size:20px;
border:none;
border-radius:12px;
text-align:center;
margin-bottom:14px;
text-transform:uppercase;
}
button{
border:none;
cursor:pointer;
transition:.2s;
}
#connectBtn{
width:100%;
padding:14px;
font-size:18px;
border-radius:12px;
background:#22c55e;
color:white;
}
#pushBtn{
margin-top:20px;
width:220px;
height:220px;
border-radius:50%;
background:#3b82f6;
color:white;
font-size:42px;
font-weight:bold;
display:none;
}
#pushBtn:hover{transform:scale(1.03)}
#pushBtn:active{transform:scale(.96)}
.status{
margin-top:16px;
opacity:.85;
}
#notif{
margin-top:18px;
font-size:24px;
color:#facc15;
min-height:32px;
}
</style>
</head>
<body>

<div class="wrap">
<div class="card">

<h1>⚡ Push Room</h1>

<input id="roomInput" placeholder="CODE ROOM" maxlength="12">
<button id="connectBtn">Connexion</button>

<button id="pushBtn">PUSH</button>

<div class="status" id="status">Non connecté</div>
<div id="notif"></div>

</div>
</div>

<script type="module">

import { createClient } from "https://esm.sh/@supabase/supabase-js@2"

const SUPABASE_URL = "https://ixbefzpxsmsvlqicwbda.supabase.co"
const SUPABASE_KEY = "sb_publishable_S0lBKp8KJQIzcdXJCdXz5A_bvv-Q9V2"

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

const roomInput = document.getElementById("roomInput")
const connectBtn = document.getElementById("connectBtn")
const pushBtn = document.getElementById("pushBtn")
const statusTxt = document.getElementById("status")
const notif = document.getElementById("notif")

let room = null
let myId = Math.random().toString(36).slice(2,8)
let channel = null

connectBtn.onclick = async () => {

  room = roomInput.value.trim().toUpperCase()
  if(!room) return

  // crée room si absente
  await supabase
    .from("rooms")
    .upsert({
      code: room,
      last_push_at: new Date().toISOString(),
      sender: "system"
    }, { onConflict:"code" })

  statusTxt.innerText = "🟢 Connecté à " + room
  pushBtn.style.display = "inline-block"

  // coupe ancien channel
  if(channel){
    await supabase.removeChannel(channel)
  }

  // écoute updates SQL
  channel = supabase
    .channel("watch-room-"+room)
    .on("postgres_changes", {
      event:"UPDATE",
      schema:"public",
      table:"rooms",
      filter:`code=eq.${room}`
    }, payload => {

      const data = payload.new

      if(data.sender !== myId && data.sender !== "system"){
        notif.innerText = "⚡ Push reçu !"

        setTimeout(()=>{
          notif.innerText = ""
        },1000)
      }

    })
    .subscribe((status)=>{
      console.log("Realtime:", status)
    })

}

pushBtn.onclick = async () => {

  if(!room) return

  await supabase
    .from("rooms")
    .update({
      last_push_at:new Date().toISOString(),
      sender:myId
    })
    .eq("code", room)

}

</script>
</body>
</html>
