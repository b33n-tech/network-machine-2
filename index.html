<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Push Room</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Arial,Helvetica,sans-serif;
background:#0f172a;
color:#fff;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}
.wrap{width:100%;max-width:460px;padding:30px;text-align:center}
.card{
background:#1e293b;
padding:25px;
border-radius:22px;
box-shadow:0 10px 30px rgba(0,0,0,.35);
}
h1{font-size:36px;margin-bottom:16px}

input{
width:100%;
padding:14px;
font-size:18px;
border:none;
border-radius:12px;
text-align:center;
margin-bottom:12px;
text-transform:uppercase;
}

button{
border:none;
cursor:pointer;
transition:.2s;
}

#connectBtn{
width:100%;
padding:14px;
font-size:18px;
border-radius:12px;
background:#22c55e;
color:white;
}

#pushBtn{
margin-top:18px;
width:210px;
height:210px;
border-radius:50%;
background:#3b82f6;
color:white;
font-size:42px;
font-weight:bold;
display:none;
}

#pushBtn:active{transform:scale(.95)}

.status{
margin-top:14px;
opacity:.85;
}

#notif{
margin-top:14px;
font-size:22px;
color:#facc15;
min-height:30px;
}

.panel{
margin-top:18px;
text-align:left;
background:#0f172a;
padding:14px;
border-radius:14px;
}

.user{
padding:6px 0;
}

.online{
color:#22c55e;
}
</style>
</head>
<body>

<div class="wrap">
<div class="card">

<h1>⚡ Push Room</h1>

<input id="roomInput" placeholder="CODE ROOM" maxlength="12">
<input id="nameInput" placeholder="TON NOM" maxlength="20">

<button id="connectBtn">Connexion</button>

<button id="pushBtn">PUSH</button>

<div class="status" id="status">Non connecté</div>
<div id="notif"></div>

<div class="panel">
<b>🖥 Postes connectés</b>
<div id="usersList">Aucun</div>
</div>

</div>
</div>

<script type="module">

import { createClient } from "https://esm.sh/@supabase/supabase-js@2"

const SUPABASE_URL = "https://ixbefzpxsmsvlqicwbda.supabase.co"
const SUPABASE_KEY = "sb_publishable_S0lBKp8KJQIzcdXJCdXz5A_bvv-Q9V2"

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

const roomInput = document.getElementById("roomInput")
const nameInput = document.getElementById("nameInput")
const connectBtn = document.getElementById("connectBtn")
const pushBtn = document.getElementById("pushBtn")
const statusTxt = document.getElementById("status")
const notif = document.getElementById("notif")
const usersList = document.getElementById("usersList")

let room = null
let myId = Math.random().toString(36).slice(2,8)
let channel = null

function renderUsers(users=[]){
if(!users.length){
usersList.innerHTML = "Aucun"
return
}
usersList.innerHTML = users.map(u =>
`<div class="user">• ${u.name}</div>`
).join("")
}

async function getRoom(){
const { data } = await supabase
.from("rooms")
.select("*")
.eq("code", room)
.single()
return data
}

connectBtn.onclick = async () => {

room = roomInput.value.trim().toUpperCase()
if(!room) return

const username = nameInput.value.trim() || "Anonyme"

let data = await getRoom()

let users = data?.machines || []

users = users.filter(u => u.id !== myId)

users.push({
id: myId,
name: username
})

await supabase.from("rooms").upsert({
code: room,
machines: users,
sender:"system",
last_push_at:new Date().toISOString()
},{ onConflict:"code" })

statusTxt.innerText = "🟢 Connecté à " + room
pushBtn.style.display = "inline-block"

renderUsers(users)

if(channel){
await supabase.removeChannel(channel)
}

channel = supabase
.channel("room-"+room)
.on("postgres_changes",{
event:"UPDATE",
schema:"public",
table:"rooms",
filter:`code=eq.${room}`
}, payload => {

const data = payload.new

renderUsers(data.machines || [])

if(data.sender !== myId && data.sender !== "system"){
notif.innerText = "⚡ Push reçu !"

setTimeout(()=>notif.innerText="",1000)
}

})
.subscribe()

}

pushBtn.onclick = async () => {

if(!room) return

await supabase
.from("rooms")
.update({
last_push_at:new Date().toISOString(),
sender:myId
})
.eq("code", room)

}

window.addEventListener("beforeunload", async () => {

if(!room) return

const row = await getRoom()
if(!row) return

let users = row.machines || []
users = users.filter(u => u.id !== myId)

await supabase
.from("rooms")
.update({ machines: users })
.eq("code", room)

})

</script>

</body>
</html>
